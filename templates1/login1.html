<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style1.css') }}">
    <title>Admin Login - Watu County</title>
    <style>
        body { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-container { 
            background: white; 
            padding: 40px; 
            border-radius: 10px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            width: 100%; 
            max-width: 400px; 
        }
        h2 { 
            color: #e74c3c; 
            margin-bottom: 10px; 
            text-align: center; 
        }
        p { 
            text-align: center; 
            color: #7f8c8d; 
            margin-bottom: 30px; 
        }
        .error { 
            background: #e74c3c; 
            color: white; 
            padding: 10px; 
            border-radius: 5px; 
            margin-bottom: 20px; 
            text-align: center; 
        }
        label { 
            display: block; 
            margin: 15px 0 5px; 
            font-weight: bold; 
            color: #34495e; 
        }
        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #bdc3c7; 
            border-radius: 5px; 
            font-size: 14px; 
            margin-bottom: 20px; 
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #e74c3c; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        button:hover { 
            background: #c0392b; 
        }
        .back-link { 
            text-align: center; 
            margin-top: 20px; 
        }
        .back-link a { 
            color: #3498db; 
            text-decoration: none; 
            font-size: 14px; 
        }
        .back-link a:hover { 
            text-decoration: underline; 
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>🔐 Admin Portal</h2>
        <p>Enter your administrative credentials</p>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <form action="/login" method="POST">
            <label for="password">Admin Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter admin password" required autofocus>
            <button type="submit">Login to Dashboard</button>
        </form>
        
        <div class="back-link">
            <a href="/">← Back to Voting Portal</a>
        </div>
    </div>
</body>
</html>
